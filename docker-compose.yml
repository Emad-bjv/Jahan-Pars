version: '3.8'

services:
  db:
    image: postgres:15
    container_name: jahanpars_db
    restart: always
    environment:
      POSTGRES_DB: jahanpars_db
      POSTGRES_USER: jahanpars
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jahanpars_redis
    restart: always
    ports:
      - "6379:6379"


volumes:
  pgdata:
