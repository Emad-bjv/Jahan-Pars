{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
<li>
    <a href="{% url 'balance-download' %}"
       style="
           display: inline-flex;
           align-items: center;
           gap: 6px;
           background: #27AE60;
           color: #fff !important;
           padding: 8px 14px;
           border-radius: 5px;
           font-weight: 700;
           font-size: 13px;
           text-decoration: none;
           box-shadow: 0 2px 6px rgba(39,174,96,0.30);
           white-space: nowrap;
       "
       onmouseover="this.style.background='#219A52'"
       onmouseout="this.style.background='#27AE60'"
       title="دانلود گزارش موازنه تفکیکی پیمانکاران"
    >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        گزارش تفکیکی پیمانکاران
    </a>
</li>
<li>
    <a href="{% url 'balance-download-global' %}"
       style="
           display: inline-flex;
           align-items: center;
           gap: 6px;
           background: #2980B9;
           color: #fff !important;
           padding: 8px 14px;
           border-radius: 5px;
           font-weight: 700;
           font-size: 13px;
           text-decoration: none;
           box-shadow: 0 2px 6px rgba(41,128,185,0.30);
           white-space: nowrap;
       "
       onmouseover="this.style.background='#2471A3'"
       onmouseout="this.style.background='#2980B9'"
       title="دانلود گزارش موازنه کل کارگاه"
    >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        گزارش موازنه کل کارگاه
    </a>
</li>
{{ block.super }}
{% endblock %}
